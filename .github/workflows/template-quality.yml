name: Template Quality

on:
  pull_request:
    paths:
      - "lib/latex/**"
      - "lib/html/exporter.ts"
      - "lib/pdf/**"
      - "lib/quality/**"
      - "fixtures/**"
      - "scripts/evaluate-templates.ts"
  workflow_dispatch:

jobs:
  template-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install TeX Live (pdflatex)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (quality scorers)
        run: npm run test:quality

      - name: Template evaluation (CI gates)
        run: npm run evaluate:templates:ci

      - name: Upload scorecard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: template-quality-report
          path: reports/template-quality/
          if-no-files-found: warn
